services:
  # ── DRISHTI API (FastAPI Backend) ────────────────────────────────────────────
  - type: web
    name: drishti-api
    runtime: python
    plan: free

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: |
      python -m uvicorn backend.api.server:app \
        --host 0.0.0.0 \
        --port $PORT \
        --log-level info \
        --no-server-header

    healthCheckPath: /api/health

    envVars:
      - key: APP_ENV
        value: production
      - key: STREAMING_BACKEND
        value: mock
      - key: LOG_LEVEL
        value: INFO
      - key: SIMULATION_TICK_SECONDS
        value: "5"
      - key: CASCADE_DECAY_RATE
        value: "0.15"
      - key: SIGNATURE_MATCH_THRESHOLD
        value: "40"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: REDIS_URL
        fromService:
          type: redis
          name: drishti-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  # ── DRISHTI Frontend (Static Site) ──────────────────────────────────────────
  - type: static
    name: drishti-frontend
    buildCommand: |
      cd frontend
      npm ci
      npm run build
    staticPublishPath: ./frontend/dist
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
    routes:
      - type: rewrite
        source: /ws/*
        destination: https://drishti-api.onrender.com/ws/:splat
      - type: rewrite
        source: /api/*
        destination: https://drishti-api.onrender.com/api/:splat
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Redis (Key-Value Cache) ───────────────────────────────────────────────────
  - type: redis
    name: drishti-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all (Render internal services)
