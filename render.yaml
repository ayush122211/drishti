services:
  - type: web
    name: drishti-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.api.server:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: STREAMING_BACKEND
        value: mock
      - key: LOG_LEVEL
        value: INFO
      - key: BATCH_SIZE
        value: "100"
      - key: PYTHON_VERSION
        value: "3.11.0"
