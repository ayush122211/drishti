# ─────────────────────────────────────────────────────────────────────────────
# DRISHTI — Full CI Pipeline
# Triggers on: push to main/develop, all pull requests to main
# Jobs: lint → test-backend → test-api → build-frontend → docker-validate → security
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [master, develop, "feature/*", "fix/*"]
  pull_request:
    branches: [master, develop]
    types: [opened, synchronize, reopened]

# Cancel in-progress runs for the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Job 1: Lint & Static Analysis ────────────────────────────────────────
  lint:
    name: "🔍 Lint & Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff linter (syntax errors = fatal)
        run: ruff check backend/ scripts/ --select E9,F63,F7,F82

      - name: Run ruff linter (full quality check — warnings only)
        run: ruff check backend/ scripts/ || true

      - name: Check import order
        run: ruff check backend/ scripts/ --select I || true

  # ── Job 2: Backend Unit Tests ────────────────────────────────────────────
  test-backend:
    name: "🧪 Backend Tests"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx respx

      - name: Generate network graph (required for tests)
        run: python scripts/generate_graph.py

      - name: Run intelligence layer tests
        run: |
          pytest tests/test_intelligence.py tests/test_cascade.py \
            -v --tb=short \
            --junit-xml=test-results/intelligence.xml

      - name: Run Phase 1 + Hardening + Phase 3 tests
        run: |
          pytest tests/test_phase1_ingestion.py tests/test_security_hardening.py tests/test_phase3_ml_runtime.py \
            -v --tb=short \
            --junit-xml=test-results/phase-tests.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: intelligence-test-results-py${{ matrix.python-version }}
          path: test-results/

  # ── Job 3: API Integration Tests ────────────────────────────────────────
  test-api:
    name: "🔌 API Integration Tests"
    runs-on: ubuntu-latest
    needs: lint
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Generate network graph
        run: python scripts/generate_graph.py

      - name: Enrich with OSINT data
        run: python backend/data/osint_engine.py || true

      - name: Run API endpoint tests
        env:
          REDIS_URL: redis://localhost:6379/0
        run: |
          pytest tests/test_api.py \
            -v --tb=short \
            --junit-xml=test-results/api.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: test-results/

  # ── Job 4: Coverage Report ───────────────────────────────────────────────
  coverage:
    name: "📊 Coverage"
    runs-on: ubuntu-latest
    needs: [test-backend, test-api]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Generate network graph
        run: python scripts/generate_graph.py

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=backend \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --ignore=tests/test_api.py || true  # API tests need Redis

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
          verbose: true

  # ── Job 5: Frontend Build ────────────────────────────────────────────────
  build-frontend:
    name: "⚛️ Frontend Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Type check (if tsconfig exists)
        working-directory: ./frontend
        run: |
          if [ -f tsconfig.json ]; then npx tsc --noEmit; fi || true

      - name: Build for production
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: ""  # relative URL for production (Nginx proxy)
          NODE_ENV: production

      - name: Check build output size
        working-directory: ./frontend
        run: |
          echo "=== Build output ==="
          du -sh dist/
          echo "=== JS bundles ==="
          find dist/assets -name "*.js" -exec du -sh {} \; | sort -rh | head -10

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ── Job 6: Docker Validation ─────────────────────────────────────────────
  docker-validate:
    name: "🐳 Docker Build Validation"
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    # Only run on main and develop to save CI minutes
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (for graph generation)
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python deps for graph
        run: pip install networkx scipy

      - name: Generate network graph
        run: python scripts/generate_graph.py

      - name: Set up Node.js (for frontend build)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: ./frontend
        run: npm ci && npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (validate only, no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: drishti-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend image (validate only, no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: false
          tags: drishti-frontend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate docker-compose config
        run: docker compose -f docker-compose.simple.yml config > /dev/null

  # ── Job 7: Security Scan ─────────────────────────────────────────────────
  security:
    name: "🔒 Security Scan"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install safety & bandit
        run: pip install safety bandit

      - name: Check dependencies for known CVEs (pip-audit)
        run: |
          pip install pip-audit
          pip install -r requirements.txt
          pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-42969 || true

      - name: Bandit security scan (high severity only)
        run: |
          bandit -r backend/ -lll -iii --skip B101 || true

  # ── Summary badge ────────────────────────────────────────────────────────
  ci-complete:
    name: "✅ CI Complete"
    runs-on: ubuntu-latest
    needs: [lint, test-backend, test-api, build-frontend]
    if: always()
    steps:
      - name: Check all required jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "❌ Lint failed"; exit 1
          fi
          if [[ "${{ needs.test-backend.result }}" != "success" ]]; then
            echo "❌ Backend tests failed"; exit 1
          fi
          if [[ "${{ needs.build-frontend.result }}" != "success" ]]; then
            echo "❌ Frontend build failed"; exit 1
          fi
          echo "✅ All required CI checks passed"
