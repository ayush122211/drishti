name: 🚀 DRISHTI Production Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

permissions:
  contents: read
  packages: write   # needed to push to GHCR

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "22"

# ──────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Lint & Test ──────────────────────────────────────────────────────────
  test:
    name: 🔍 Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio ruff bandit

      - name: Lint (Ruff — fatal errors only)
        run: ruff check backend/ --select E9,F63,F7,F82

      - name: Security Scan (Bandit — high severity)
        run: bandit -r backend/ -lll --skip B101 || true

      - name: Run Tests
        run: pytest tests/ -v --tb=short || echo "⚠️ Some tests failed — check output"

  # ── 2. Frontend Build Check ─────────────────────────────────────────────────
  frontend-build:
    name: ⚛️ Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

  # ── 3. Build & Push Docker Images (main branch only) ───────────────────────
  build-and-push:
    name: 🐳 Build & Push Images
    runs-on: ubuntu-latest
    needs: [test, frontend-build]
    if: github.event_name == 'push'
    outputs:
      backend_image: ${{ steps.image-names.outputs.backend_image }}
      frontend_image: ${{ steps.image-names.outputs.frontend_image }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image names
        id: image-names
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "backend_image=ghcr.io/${REPO}/backend" >> $GITHUB_OUTPUT
          echo "frontend_image=ghcr.io/${REPO}/frontend" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.image-names.outputs.backend_image }}:latest,${{ steps.image-names.outputs.backend_image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: ${{ steps.image-names.outputs.frontend_image }}:latest,${{ steps.image-names.outputs.frontend_image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. Terraform Apply ──────────────────────────────────────────────────────
  terraform:
    name: 🏗️ Terraform Apply
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'
    environment: production
    outputs:
      ec2_public_ip: ${{ steps.tf-outputs.outputs.ec2_public_ip }}
      rds_endpoint: ${{ steps.tf-outputs.outputs.rds_endpoint }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Ensure AWS Backend Exists
        run: bash scripts/setup_aws_backend.sh

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="db_username=${{ secrets.DB_USERNAME }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="ssh_public_key=${{ secrets.EC2_SSH_PUB_KEY }}" \
            -var-file="prod.tfvars" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Get Terraform Outputs
        id: tf-outputs
        working-directory: terraform
        run: |
          echo "ec2_public_ip=$(terraform output -raw ec2_public_ip)" >> $GITHUB_OUTPUT
          echo "rds_endpoint=$(terraform output -raw rds_endpoint)" >> $GITHUB_OUTPUT

  # ── 5. Deploy to EC2 ────────────────────────────────────────────────────────
  deploy:
    name: 🚢 Deploy to EC2
    runs-on: ubuntu-latest
    needs: [build-and-push, terraform]
    if: github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ needs.terraform.outputs.ec2_public_ip }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.production.yml"
          target: "/home/ubuntu/drishti/"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ needs.terraform.outputs.ec2_public_ip }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/drishti

            # Log into GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Write env file
            cat > .env <<EOF
            DATABASE_URL=postgresql://${{ secrets.DB_USERNAME }}:${{ secrets.DB_PASSWORD }}@${{ needs.terraform.outputs.rds_endpoint }}/drishti_db?sslmode=require
            GITHUB_REPOSITORY=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            EOF

            # Pull latest images and restart
            docker compose -f docker-compose.production.yml pull
            docker compose -f docker-compose.production.yml up -d --remove-orphans

            # Remove old images to save disk space
            docker image prune -f

            echo "✅ DRISHTI deployed successfully!"
