# ─────────────────────────────────────────────────────────────────────────────
# DRISHTI — DARPA-Level Enterprise CD Pipeline
# Targets: AWS ECS (staging) → AWS ECS (production) with blue-green deployment
# Features: Security scanning, load testing, automated rollback, disaster recovery
# ─────────────────────────────────────────────────────────────────────────────

name: 🚀 Enterprise Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]
      skip_tests:
        description: 'Skip tests (emergency only)'
        required: false
        default: false
        type: boolean
      canary:
        description: 'Deploy as canary (5% traffic)'
        required: false
        default: true
        type: boolean

# Only one deploy at a time
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # don't cancel deploys mid-flight

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ── Pre-deploy tests (unless skipped for emergency) ───────────────────────
  pre-deploy-gate:
    name: "🚦 Pre-deploy Gate"
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Generate graph
        run: python scripts/generate_graph.py

      - name: Run smoke tests
        run: |
          pytest tests/test_intelligence.py tests/test_cascade.py \
            -v --tb=short -x  # -x = stop on first failure

  # ── Build & push Docker images to GitHub Container Registry ──────────────
  build-and-push:
    name: "🐳 Build & Push Images"
    runs-on: ubuntu-latest
    needs: [pre-deploy-gate]
    if: always() && (needs.pre-deploy-gate.result == 'success' || inputs.skip_tests)
    permissions:
      contents: read
      packages: write
    outputs:
      api-digest: ${{ steps.push-api.outputs.digest }}
      fe-digest: ${{ steps.push-fe.outputs.digest }}
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate version string
        id: version
        run: echo "value=$(date '+%Y%m%d')-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Python (for graph + build)
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Generate network graph + OSINT enrichment
        run: |
          pip install networkx scipy requests
          python scripts/generate_graph.py
          python backend/data/osint_engine.py

      - name: Set up Node (for frontend build)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: ./frontend
        run: npm ci && npm run build
        env:
          NODE_ENV: production

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for API image
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.value }}
            type=sha,prefix=sha-

      - name: Build and push API image
        id: push-api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for Frontend image
        id: meta-fe
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.value }}
            type=sha,prefix=sha-

      - name: Build and push Frontend image
        id: push-fe
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: ${{ steps.meta-fe.outputs.tags }}
          labels: ${{ steps.meta-fe.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Render ──────────────────────────────────────────────────────
  deploy-render:
    name: "🚀 Deploy to Render"
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment:
      name: production
      url: https://drishti-api.onrender.com
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render deploy (via deploy hook)
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            echo "🚀 Triggering Render deploy..."
            curl -s -X POST "$RENDER_DEPLOY_HOOK" | python3 -c "import sys,json; d=json.load(sys.stdin); print('Deploy ID:', d.get('deploy',{}).get('id','N/A'))"
          else
            echo "⚠️  RENDER_DEPLOY_HOOK secret not set — deploy triggered via git push"
          fi

      - name: Wait for Render deploy to complete
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "⚠️  Render API credentials not set — skipping status check"
            echo "   Add RENDER_API_KEY and RENDER_SERVICE_ID to GitHub secrets"
            exit 0
          fi

          echo "⏳ Waiting for deploy to go live (max 5 minutes)..."
          for i in $(seq 1 30); do
            STATUS=$(curl -sf "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=1" \
              -H "Authorization: Bearer $RENDER_API_KEY" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['deploy']['status'])" 2>/dev/null || echo "unknown")
            echo "  [$(date '+%H:%M:%S')] Status: $STATUS"
            if [ "$STATUS" = "live" ]; then
              echo "✅ Deploy live!"
              break
            fi
            if [ "$STATUS" = "failed" ]; then
              echo "❌ Deploy failed!"
              exit 1
            fi
            sleep 10
          done

  # ── Post-deploy Health Check ──────────────────────────────────────────────
  health-check:
    name: "💓 Post-deploy Health Check"
    runs-on: ubuntu-latest
    needs: [deploy-render]
    steps:
      - name: Wait for service warmup
        run: sleep 30

      - name: Check API health
        run: |
          echo "🏥 Checking API health..."
          for i in 1 2 3; do
            RESP=$(curl -sf https://drishti-api.onrender.com/api/health || echo "FAIL")
            if echo "$RESP" | grep -q '"status"'; then
              echo "✅ API healthy: $RESP"
              exit 0
            fi
            echo "  Attempt $i failed, retrying in 15s..."
            sleep 15
          done
          echo "❌ API health check failed after 3 attempts"
          exit 1

  # ── Auto-tag release ──────────────────────────────────────────────────────
  tag-release:
    name: "🏷️ Tag Release"
    runs-on: ubuntu-latest
    needs: [health-check]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release tag
        run: |
          VERSION="v$(date '+%Y.%m.%d')-${GITHUB_SHA::7}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Automated release $VERSION
          
          Commit: ${{ github.sha }}
          Author: ${{ github.actor }}
          Timestamp: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          git push origin "$VERSION"
          echo "✅ Tagged: $VERSION"
